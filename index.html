<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found · GitHub Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p><strong>There isn't a GitHub Pages site here.</strong></p>
        <p>
            If you're trying to publish one, read the 
            <a href="https://github.com">full documentation</a> 
            to learn how to set up GitHub Pages for your repository, organization, or user account.
        </p>
        <div class="footer">
            <a href="https://www.githubstatus.com/">GitHub Status</a> — 
            <a href="https://twitter.com">@githubstatus</a>
        </div>
        <!-- Realism: The Octocat image requested -->
        <img src="octocat.png" alt="Octocat" class="octocat-img">
    </div>
    <script src="script.js"></script>
</body>
</html>
