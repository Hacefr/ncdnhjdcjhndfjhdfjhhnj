<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found · GitHub Pages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="error-box">
            <h1>404</h1>
            <p><strong>There isn't a GitHub Pages site here.</strong></p>
            <p>
                If you're trying to publish one, read the 
                <a href="https://docs.github.com/en/pages">full documentation</a> 
                to learn how to set up GitHub Pages for your repository, organization, or user account.
            </p>
            <div class="troubleshooting">
                <p><strong>GitHub Status —</strong> <a href="https://www.githubstatus.com/">@githubstatus</a></p>
            </div>
        </div>
        <!-- Standard Octocat Illustration -->
        <img src="404-illustration.svg" alt="404 Illustration" class="illustration">
    </div>

    <script>
        // Simple log for debugging
        console.log("404 Error: The requested page could not be found.");
    </script>
</body>
</html>
